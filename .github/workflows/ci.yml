name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      JWT_ACCESS_SECRET: ci-access-secret-key
      JWT_REFRESH_SECRET: ci-refresh-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: back-end/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: back-end
        run: pnpm install

      - name: Type check
        working-directory: back-end
        run: pnpm type-check

      - name: Lint
        working-directory: back-end
        run: pnpm lint

      - name: Test
        working-directory: back-end
        run: pnpm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: front-end/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: front-end
        run: pnpm install

      - name: Type check
        working-directory: front-end
        run: pnpm type-check

      - name: Lint
        working-directory: front-end
        run: pnpm lint
